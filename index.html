<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyPal</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id = "first-page">
        <header>
            <div id="buttons-left">
                <img src="images/logo.jpg" alt="logo" width="170" id = "logo">
            </div>
            <div id="buttons-center">
                <button>
                    Resources 
                    <img src="images/arrow_down.png" alt="" width="15" class = "arrow-down">
                </button>
                <button>
                    Features
                    <img src="images/arrow_down.png" alt="" width="15" class = "arrow-down">
                </button>
                <button>
                    Campus+OpenSource
                    <img src="images/arrow_down.png" alt="" width="15" class = "arrow-down">
                </button>
            </div>
            <div id="buttons-right">
                <button>
                    Get StudyPal
                </button>
            </div>
        </header>
        <div id="body-text"> <!-- This part needs fixing, it isn't responsive for ipad -->
            <div id="text">
                <p id = "main-text">Study <u class = "highlight">Smarter</u>, Not <span class = "highlight">Harder</span></p>
                <p>Studypal includes only the most effective study tools that put you in control of your learning. </p>
            </div>
              <div id="link">
                <button id ="get-study-pal">
                    <img src="images/Cat-logo.png" alt="cat" width="50" id = "cat-logo">
                    <span id = "get-study-pal-text"><b>Download Studypal &nbsp </b><img src="images/download.png" alt="arrow" width="20" id = "download-arrow"></span>
                </button>
                <u>Scroll to see all features</u>
              </div>
        </div>
    </div>
</body>
</html>
